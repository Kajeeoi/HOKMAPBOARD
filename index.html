<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>HOK Strategy Board</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="desktop">

    <!-- ==========================
         TOOLBAR
    =========================== -->

    <header id="toolbar">

        <div class="logo">

            <h1>HOK Strategy Board</h1>

        </div>


        <div class="toolbar-center">

            <div class="slider-group">

                <span>Icon</span>

                <input
                    type="range"
                    id="sizeSlider"
                    min="40"
                    max="100"
                    value="60">

                <span id="sizeValue">

                    60 px

                </span>

            </div>

        </div>


        <div class="toolbar-right">

            <div class="view-mode">

                <button id="desktopMode">
                    🖥 Desktop
                </button>

                <button id="tabletMode">
                    📟 Tablet
                </button>

                <button id="mobileMode">
                    📱 Mobile
                </button>

            </div>

            <button id="fullscreenBtn">

                ⛶ Fullscreen

            </button>

            <button id="resetBtn">

                Reset

            </button>

        </div>

    </header>



    <!-- ==========================
         BOARD
    =========================== -->

    <main id="board">


        <!-- ==========================
             BLUE PANEL
        =========================== -->

        <aside id="bluePanel">

            <img
                id="blue-jgl"
                class="role"
                src="assets/junglerblue.png"
                draggable="false">

            <img
                id="blue-mid"
                class="role"
                src="assets/midblue.png"
                draggable="false">

            <img
                id="blue-farm"
                class="role"
                src="assets/farmblue.png"
                draggable="false">

            <img
                id="blue-clash"
                class="role"
                src="assets/clashblue.png"
                draggable="false">

            <img
                id="blue-roam"
                class="role"
                src="assets/roamblue.png"
                draggable="false">

        </aside>



        <!-- ==========================
             MAP
        =========================== -->

        <section id="mapArea">

            <div id="mapWrapper">

                <img
                    id="map"
                    src="assets/map.png"
                    draggable="false">

            </div>

        </section>



        <!-- ==========================
             RED PANEL
        =========================== -->

        <aside id="redPanel">

            <img
                id="red-jgl"
                class="role"
                src="assets/jungred.png"
                draggable="false">

            <img
                id="red-mid"
                class="role"
                src="assets/midred.png"
                draggable="false">

            <img
                id="red-farm"
                class="role"
                src="assets/farmred.png"
                draggable="false">

            <img
                id="red-clash"
                class="role"
                src="assets/clashred.png"
                draggable="false">

            <img
                id="red-roam"
                class="role"
                src="assets/roamred.png"
                draggable="false">

        </aside>

    </main>



    <!-- ==========================
         FUTURE TOOLBAR
    =========================== -->

    <div id="floatingTools">

        <button id="drawBtn">

            ✏ Draw

        </button>

        <button id="pingBtn">

            📍 Ping

        </button>

        <button id="saveBtn">

            💾 Save

        </button>

        <button id="clearBtn">

            🗑 Clear

        </button>

    </div>


    <script src="script.js"></script>

</body>

</html>
